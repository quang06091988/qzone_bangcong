<style>
  :root{
    --bg:#1a0e0a; --card:#221410; --card2:#2e1a10;
    --line:rgba(201,169,110,.25);
    --text:#f5ede0; --muted:#a89070;
    --accent:#c9a96e; --accent-light:#e8cc99; --gold-dim:#7a6040;
    --success:#8fbf7f; --danger:#e07a5f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Be Vietnam Pro',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;min-height:100dvh;
    touch-action:manipulation;
  }
  @media (min-width:600px){
    body{background:radial-gradient(1000px 500px at 50% -10%, #2e1a10 0%, var(--bg) 60%) fixed}
  }
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .wrap{max-width:720px;margin:0 auto;padding:0 16px calc(28px + env(safe-area-inset-bottom))}

  .hero{
    margin:0 -16px;padding:24px 16px 16px;text-align:center;
    background:radial-gradient(ellipse at top,#2e1a10 0%,#1a0e0a 70%);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;justify-content:center;gap:10px}
  .brand-q{font-family:'Playfair Display',serif;font-size:46px;font-weight:700;color:var(--accent);line-height:1;letter-spacing:-1px;text-shadow:0 0 32px rgba(201,169,110,.35)}
  .brand-zone{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--accent);letter-spacing:8px;line-height:1;margin-right:-8px}
  .brand-sub{font-size:10px;letter-spacing:4px;color:var(--muted);margin-top:5px}
  .gold-line{width:64px;height:1px;background:var(--gold-dim);margin:12px auto 10px}
  .tagline{color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase}

  /* Chọn tháng */
  .monthbar{display:flex;align-items:center;justify-content:center;gap:14px;margin:20px 0 16px}
  .mbtn{
    width:42px;height:42px;border-radius:50%;
    background:var(--card);border:1px solid var(--line);color:var(--accent-light);
    font-size:18px;cursor:pointer;transition:border-color .15s;
  }
  .mbtn:hover{border-color:var(--accent)}
  .mlabel{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--accent-light);letter-spacing:1px;min-width:130px;text-align:center;cursor:pointer}
  .mlabel:hover{color:var(--accent)}
  .mbtn:disabled{opacity:.3;cursor:default}
  .mbtn:disabled:hover{border-color:var(--line)}
  .mhint{text-align:center;font-size:11.5px;color:var(--gold-dim);margin:-8px 0 14px}
  .scrollhint{display:none;text-align:center;font-size:11px;color:var(--gold-dim);margin-top:8px}
  @media (max-width:560px){.scrollhint{display:block}}

  /* Thẻ tổng quan */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .kcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center}
  .kcard .v{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--accent-light)}
  .kcard .k{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dim);margin-top:5px}

  /* Bảng công */
  .tablebox{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:auto}
  table{width:100%;border-collapse:collapse;min-width:520px}
  th{
    font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dim);
    text-align:right;padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;
  }
  th:first-child{text-align:left}
  td{
    padding:12px 14px;text-align:right;border-bottom:1px solid rgba(201,169,110,.12);
    font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  td:first-child{text-align:left;font-weight:600}
  tr:last-child td{border-bottom:none}
  td.dim{color:var(--muted)}
  td.pay{color:var(--accent-light);font-weight:600;font-family:'Space Mono',monospace;font-size:13.5px}
  .off{color:var(--muted);font-weight:400;font-size:12px}
  tfoot td{border-top:1px solid var(--line);border-bottom:none;font-weight:800;color:var(--accent-light)}
  tfoot td:first-child{color:var(--gold-dim);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}

  .note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
  .note b{color:var(--accent-light)}
  .err{color:var(--danger)}
  .loading{text-align:center;color:var(--muted);padding:40px 0}
  .backlink{display:block;text-align:center;margin-top:20px;color:var(--gold-dim);font-size:13px;text-decoration:none}
  .backlink:hover{color:var(--accent)}

  /* Chi tiết từng người */
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:rgba(201,169,110,.06)}
  .overlay{
    position:fixed;inset:0;background:rgba(10,5,3,.72);
    display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  .overlay.show{display:flex}
  .sheet{
    background:var(--card);border:1px solid var(--line);
    border-radius:22px 22px 0 0;width:100%;max-width:720px;
    max-height:82vh;display:flex;flex-direction:column;
    animation:slideup .22s ease;
  }
  @keyframes slideup{from{transform:translateY(24px);opacity:.4}to{transform:none;opacity:1}}
  @media (prefers-reduced-motion:reduce){.sheet{animation:none}}
  @media (min-width:600px){
    .overlay{align-items:center;padding:24px}
    .sheet{border-radius:22px;max-height:80vh}
  }
  .sheet-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}
  .sheet-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--accent-light)}
  .sheet-sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .sheet-sub b{color:var(--accent-light)}
  .xbtn{width:38px;height:38px;flex:none;border-radius:50%;background:var(--card2);border:1px solid var(--line);color:var(--muted);font-size:15px;cursor:pointer}
  .xbtn:hover{color:var(--accent);border-color:var(--accent)}
  .sheet-body{overflow:auto;padding:4px 20px 22px}
  .drow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(201,169,110,.12);font-size:14px}
  .drow:last-child{border-bottom:none}
  .drow .dd{font-family:'Space Mono',monospace;color:var(--accent-light);font-weight:700;min-width:96px}
  .drow .dc{flex:1;font-weight:600}
  .drow .dt{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .drow .dm{color:var(--gold-dim);font-size:12.5px;min-width:44px;text-align:right}
  .drow a{color:var(--gold-dim);text-decoration:none;font-size:13px;white-space:nowrap}
  .drow a:hover{color:var(--accent)}
  .empty{color:var(--muted);text-align:center;padding:26px 0}

  /* Chốt sổ */
  .lockbtn{
    display:block;margin:18px auto 0;
    background:none;border:1px solid var(--line);border-radius:40px;
    color:var(--accent-light);font:600 14px 'Be Vietnam Pro',sans-serif;
    letter-spacing:.5px;padding:11px 26px;cursor:pointer;
    transition:border-color .15s,color .15s;
  }
  .lockbtn:hover{border-color:var(--accent);color:var(--accent)}

  /* Bản in chốt sổ: nền trắng chữ đen, chỉ hiện khi in */
  #printArea{display:none}
  @media print{
    @page{margin:0}  /* lề 0 = trình duyệt không in URL/tiêu đề ở đầu-chân trang */
    body{background:#fff !important}
    body > .wrap, body > .overlay{display:none !important}
    #printArea{display:block;color:#000;font-family:'Be Vietnam Pro',Arial,sans-serif;padding:14mm 12mm}
  }
  #printArea .p-brand{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:700;letter-spacing:2px}
  #printArea .p-sub{font-size:10px;letter-spacing:3px;color:#555;margin-top:2px}
  #printArea h1{font-size:17px;text-align:center;margin:14px 0 4px;letter-spacing:1px}
  #printArea .p-meta{text-align:center;font-size:11.5px;color:#444;margin-bottom:14px}
  #printArea table{width:100%;border-collapse:collapse;font-size:12.5px}
  #printArea th,#printArea td{border:1px solid #000;padding:7px 8px;text-align:right}
  #printArea th{background:#efe9dc;font-size:11px;letter-spacing:.5px}
  #printArea th:first-child,#printArea td:first-child{text-align:left}
  #printArea td.ky{min-width:78px}
  #printArea tfoot td{font-weight:800;background:#f7f3ea}
  #printArea .p-sign{display:flex;justify-content:space-between;margin-top:26px;font-size:12.5px}
  #printArea .p-sign .col{text-align:center;width:46%}
  #printArea .p-sign .role{font-weight:700;margin-top:4px}
  #printArea .p-sign .space{height:64px}
  #printArea .p-note{font-size:10.5px;color:#555;margin-top:8px}

  @media (max-width:480px){
    .cards{gap:8px}
    .kcard .v{font-size:15px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="brand"><span class="brand-q">Q</span><span class="brand-zone">ZONE</span></div>
    <div class="brand-sub">coffee &amp; tea</div>
    <div class="gold-line"></div>
    <div class="tagline">Bảng công · Lương tháng</div>
  </header>

  <div class="monthbar">
    <button class="mbtn" id="prev" aria-label="Tháng trước">‹</button>
    <div class="mlabel" id="mlabel">—</div>
    <button class="mbtn" id="next" aria-label="Tháng sau" title="Tháng sau">›</button>
  </div>
  <div class="mhint">‹ › đổi tháng · bấm tên tháng để về tháng này · bấm dòng nhân viên xem chi tiết</div>

  <div id="content"><div class="loading">Đang tải dữ liệu…</div></div>
  <button class="lockbtn" id="btnPrint">🖨&nbsp; Chốt sổ tháng này</button>
  <div class="note" id="note"></div>

  <a class="backlink" href="https://qzone-chamcong.vercel.app/">← Về trang chấm công</a>
</div>

<div id="printArea"></div>

<!-- Chi tiết từng người -->
<div class="overlay" id="ovl">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <div class="sheet-title" id="dTitle">—</div>
        <div class="sheet-sub" id="dSub"></div>
      </div>
      <button class="xbtn" id="dClose" aria-label="Đóng">✕</button>
    </div>
    <div class="sheet-body" id="dBody"></div>
  </div>
</div>

<script>
/* ================== CẤU HÌNH ================== */
const PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS74gW_qpFuYMyCvPZkELrZpPB-mkrXf13ekJzF5_wspmmaH3pNeELlteTwdktU0dqxJa71n0kH5Axn/pub?single=true&output=csv&gid=';
const CONFIG = {
  CHAMCONG_CSV: PUB + '2105710057',
  NHANVIEN_CSV: PUB + '1158146117',
  CALAM_CSV:    PUB + '768420674',
  INFO_CSV:     PUB + '1062432245',
  RATE_FIELD:   'Tiền một giờ',          // tên dòng đơn giá GIỜ trong tab Info
};
/* ============================================== */

const $ = id => document.getElementById(id);
const fmtVND = n => n.toLocaleString('vi-VN') + 'đ';

function parseCSV(text){
  const rows=[]; let row=[], cell='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; } else cell+=c; }
    else if(c==='"') q=true;
    else if(c===','){ row.push(cell); cell=''; }
    else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
    else if(c!=='\r') cell+=c;
  }
  if(cell||row.length){ row.push(cell); rows.push(row); }
  return rows;
}

/* Chuẩn hóa ngày về 'YYYY-MM' — chịu được cả 2026-07-09 lẫn 09/07/2026 */
function toYM(v){
  const s = String(v||'').trim();
  let m = s.match(/^(\d{4})-(\d{2})/);
  if(m) return m[1]+'-'+m[2];
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return m[3]+'-'+String(m[2]).padStart(2,'0');
  return '';
}

function parseH(v){
  const s = String(v||'').trim().replace('h',':');
  if(!s) return NaN;
  const [hh, mm] = s.split(':');
  return parseInt(hh,10) + (parseInt(mm,10)||0)/60;
}
const fmtHrs = n => (Math.round(n*10)/10).toLocaleString('vi-VN');

const DOW = ['CN','T2','T3','T4','T5','T6','T7'];
function dayLabel(v){
  const s = String(v||'').trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/), dt = null;
  if(m) dt = new Date(+m[1], +m[2]-1, +m[3]);
  else{
    m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m) dt = new Date(+m[3], +m[2]-1, +m[1]);
  }
  if(!dt || isNaN(dt)) return s;
  return DOW[dt.getDay()] + ' ' + String(dt.getDate()).padStart(2,'0') + '/' + String(dt.getMonth()+1).padStart(2,'0');
}

let DATA = null;           // {records, roster, shifts, rate}
let LAST = null;           // dữ liệu bảng của tháng đang xem (cho chốt sổ)
let month = (() => {       // 'YYYY-MM' hiện tại
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
})();

async function loadAll(){
  try{
    const bust = '&t=' + Date.now();
    const [cc, nv, cl, inf] = await Promise.all([
      fetch(CONFIG.CHAMCONG_CSV + bust).then(r=>r.text()),
      fetch(CONFIG.NHANVIEN_CSV + bust).then(r=>r.text()),
      fetch(CONFIG.CALAM_CSV + bust).then(r=>r.text()),
      fetch(CONFIG.INFO_CSV + bust).then(r=>r.text()),
    ]);
    // ChamCong: Ngày | Giờ | Tên | Ca | Khoảng cách | Ảnh
    const records = parseCSV(cc).slice(1)
      .map(r => ({ ym: toYM(r[0]), dstr: String(r[0]||'').trim(), time: (r[1]||'').trim(), name: (r[2]||'').trim(), ca: (r[3]||'').trim(), dist: (r[4]||'').trim(), photo: (r[5]||'').trim() }))
      .filter(r => r.ym && r.name && r.ca);
    // NhanVien: Tên | Nghỉ
    const nvRows = parseCSV(nv).slice(1).filter(r => r[0] && r[0].trim());
    const roster = nvRows.map(r => ({ name: r[0].trim(), off: String(r[1]||'').trim().toLowerCase()==='x' }));
    // CaLam: Ca | Icon | Từ | Đến
    const shifts = parseCSV(cl).slice(1)
      .map(r => {
        const from = parseH(r[2]), to = parseH(r[3]);
        let hrs = to - from;
        if(!isNaN(hrs) && hrs <= 0) hrs += 24;   // ca qua đêm (vd 22h–2h)
        return { id: (r[0]||'').trim(), hours: isNaN(hrs) ? 0 : hrs };
      })
      .filter(s => s.id);
    const hoursMap = Object.fromEntries(shifts.map(s => [s.id, s.hours]));
    // Info: tìm dòng đơn giá
    let rate = null;
    for(const r of parseCSV(inf)){
      if(String(r[0]||'').trim().toLowerCase() === CONFIG.RATE_FIELD.toLowerCase()){
        const raw = String(r[1]||'').trim();
        let num = parseInt(raw.replace(/[^\d]/g,''), 10);
        if(/k/i.test(raw)) num *= 1000;          // "25k" -> 25000
        if(num > 0 && num < 1000) num = NaN;      // chặn giá vô lý (< 1.000đ/ca) do gõ sai
        if(num > 0) rate = num;
        break;
      }
    }
    DATA = { records, roster, shifts, hoursMap, rate };
    render();
  }catch(e){
    $('content').innerHTML = '<div class="loading err" id="retry" style="cursor:pointer">⚠ Không tải được dữ liệu — bấm vào đây để thử lại</div>';
    $('retry').onclick = () => { $('content').innerHTML = '<div class="loading">Đang tải dữ liệu…</div>'; loadAll(); };
  }
}

function render(){
  if(!DATA) return;
  const { records, roster, shifts, hoursMap, rate } = DATA;
  const [y, m] = month.split('-');
  $('mlabel').textContent = 'Tháng ' + parseInt(m,10) + '/' + y;
  const nowYM = (() => { const n = new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); })();
  $('next').disabled = month >= nowYM;   // tương lai chưa có gì để xem

  const recs = records.filter(r => r.ym === month);

  // Danh sách người: theo thứ tự NhanVien, cộng thêm người chỉ có trong dữ liệu cũ
  const names = roster.map(p => p.name);
  for(const r of recs) if(!names.includes(r.name)) names.push(r.name);
  const offSet = new Set(roster.filter(p => p.off).map(p => p.name));

  // Cột ca: theo CaLam, cộng "Khác" nếu dữ liệu có ca ngoài danh sách
  const cols = shifts.map(s => s.id);
  const extra = recs.some(r => !cols.includes(r.ca));
  if(extra) cols.push('Khác');

  // Đếm ca
  const tally = {};
  for(const n of names) tally[n] = Object.fromEntries([...cols.map(c=>[c,0]), ['total',0], ['hours',0]]);
  for(const r of recs){
    const col = cols.includes(r.ca) ? r.ca : 'Khác';
    tally[r.name][col]++; tally[r.name].total++;
    tally[r.name].hours += hoursMap[col] || 0;   // ca "Khác" không rõ giờ -> 0
  }

  const totalShifts = recs.length;
  const totalHours = names.reduce((s,n) => s + tally[n].hours, 0);
  const totalPay = rate != null ? Math.round(totalHours * rate) : null;

  let html = `
  <div class="cards">
    <div class="kcard"><div class="v">${totalShifts}</div><div class="k">Tổng ca</div></div>
    <div class="kcard"><div class="v">${fmtHrs(totalHours)}</div><div class="k">Tổng giờ</div></div>
    <div class="kcard"><div class="v">${totalPay != null ? fmtVND(totalPay) : '—'}</div><div class="k">Tổng lương</div></div>
  </div>
  <div class="tablebox"><table>
    <thead><tr><th>Nhân viên</th>${cols.map(c=>`<th>${c}</th>`).join('')}<th>Tổng ca</th><th>Giờ</th><th>Lương</th></tr></thead>
    <tbody>`;
  const shown = names.filter(n => tally[n].total > 0 || !offSet.has(n));
  LAST = { cols, shown, tally, totalShifts, totalHours, totalPay, offSet };
  if(!shown.length){
    html += `<tr><td colspan="${cols.length+4}" style="text-align:center;color:var(--muted);padding:26px">Chưa có nhân viên — thêm tên vào tab NhanVien của Google Sheet</td></tr>`;
  }
  for(const n of shown){
    const t = tally[n];
    html += `<tr data-name="${n.replace(/"/g,'&quot;')}"><td>${n}${offSet.has(n) ? ' <span class="off">(nghỉ)</span>' : ''}</td>`
      + cols.map(c => `<td class="${t[c] ? '' : 'dim'}">${t[c] || '·'}</td>`).join('')
      + `<td><b>${t.total || '·'}</b></td>`
      + `<td>${t.hours ? fmtHrs(t.hours) : '·'}</td>`
      + `<td class="pay">${rate != null && t.hours ? fmtVND(Math.round(t.hours*rate)) : '·'}</td></tr>`;
  }
  html += `</tbody>
    <tfoot><tr><td>Tổng</td>${cols.map(c => `<td>${recs.filter(r => (cols.includes(r.ca)?r.ca:'Khác')===c).length}</td>`).join('')}
    <td>${totalShifts}</td><td>${fmtHrs(totalHours)}</td><td class="pay">${totalPay != null ? fmtVND(totalPay) : '·'}</td></tr></tfoot>
  </table></div>
  <div class="scrollhint">← vuốt ngang để xem đủ cột →</div>`;

  $('content').innerHTML = html;
  document.querySelectorAll('#content tbody tr[data-name]').forEach(tr => {
    tr.onclick = () => openDetail(tr.dataset.name);
    tr.tabIndex = 0;
    tr.setAttribute('role','button');
    tr.onkeydown = e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openDetail(tr.dataset.name); } };
  });

  const note = $('note');
  if(rate == null){
    note.innerHTML = '⚠ Chưa có đơn giá — thêm dòng <b>Tiền một giờ</b> vào tab Info của Google Sheet (ví dụ: Tiền một giờ | 25000) là cột Lương tự hiện.';
    note.classList.add('err');
  }else{
    note.classList.remove('err');
    note.innerHTML = `Lương = số giờ × <b>${fmtVND(rate)}/giờ</b> (giờ mỗi ca theo Từ–Đến trong tab CaLam, đơn giá sửa ở tab Info) · Tải lại trang để cập nhật số liệu.`
      + (extra ? '<br>⚠ Có lượt chấm mang tên ca không còn trong tab CaLam (cột "Khác") — không tính được giờ/lương cho các lượt này.' : '');
  }
}

function openDetail(name){
  if(!DATA || !name) return;
  const { records, rate } = DATA;
  const recs = records
    .filter(r => r.ym === month && r.name === name)
    .sort((a,b) => (a.dstr + a.time).localeCompare(b.dstr + b.time));
  const [y, m] = month.split('-');
  $('dTitle').textContent = name;
  const hrs = recs.reduce((s,r) => s + (DATA.hoursMap[r.ca] || 0), 0);
  $('dSub').innerHTML = `Tháng ${parseInt(m,10)}/${y} · <b>${recs.length} ca</b> · <b>${fmtHrs(hrs)} giờ</b>`
    + (rate != null && hrs ? ` · <b>${fmtVND(Math.round(hrs*rate))}</b>` : '');
  $('dBody').innerHTML = recs.length
    ? recs.map(r => `<div class="drow">
        <span class="dd">${dayLabel(r.dstr)}</span>
        <span class="dc">${r.ca}</span>
        <span class="dt">${r.time}</span>
        <span class="dm">${r.dist !== '' ? r.dist + 'm' : ''}</span>
        ${r.photo ? `<a href="${r.photo}" target="_blank" rel="noopener">ảnh ↗</a>` : ''}
      </div>`).join('')
    : '<div class="empty">Chưa có lượt chấm nào trong tháng này</div>';
  $('ovl').classList.add('show');
}
$('dClose').onclick = () => $('ovl').classList.remove('show');
$('ovl').onclick = e => { if(e.target === $('ovl')) $('ovl').classList.remove('show'); };
document.addEventListener('keydown', e => { if(e.key === 'Escape') $('ovl').classList.remove('show'); });

function chotSo(){
  if(!LAST || !DATA) return;
  if(!LAST.totalShifts){
    const note = $('note');
    note.innerHTML = '⚠ Tháng này chưa có lượt chấm nào — không có gì để chốt sổ.';
    note.classList.add('err');
    setTimeout(render, 2600);  // trả lại chú thích cũ
    return;
  }
  const { cols, shown, tally, totalShifts, totalHours, totalPay, offSet } = LAST;
  const { records, rate } = DATA;
  const recs = records.filter(r => r.ym === month);
  const [y, m] = month.split('-');
  const now = new Date();
  const stamp = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0')
    + ' ngày ' + now.getDate() + '/' + (now.getMonth()+1) + '/' + now.getFullYear();

  let html = `
  <div class="p-brand">Q ZONE</div>
  <div class="p-sub">COFFEE &amp; TEA</div>
  <h1>BẢNG LƯƠNG THÁNG ${parseInt(m,10)}/${y}</h1>
  <div class="p-meta">Đơn giá: ${rate != null ? fmtVND(rate) + '/giờ' : 'chưa có'} &nbsp;·&nbsp; Chốt lúc ${stamp} &nbsp;·&nbsp; Nguồn: dữ liệu chấm công Q Zone</div>
  <table>
    <thead><tr><th>Nhân viên</th>${cols.map(c=>`<th>${c}</th>`).join('')}<th>Tổng ca</th><th>Giờ</th><th>Lương</th><th>Ký nhận</th></tr></thead>
    <tbody>`;
  for(const n of shown){
    const t = tally[n];
    html += `<tr><td>${n}${offSet.has(n) ? ' (nghỉ)' : ''}</td>`
      + cols.map(c => `<td>${t[c] || ''}</td>`).join('')
      + `<td><b>${t.total || ''}</b></td>`
      + `<td>${t.hours ? fmtHrs(t.hours) : ''}</td>`
      + `<td>${rate != null && t.hours ? fmtVND(Math.round(t.hours*rate)) : ''}</td>`
      + `<td class="ky"></td></tr>`;
  }
  html += `</tbody>
    <tfoot><tr><td>TỔNG</td>${cols.map(c => `<td>${recs.filter(r => (cols.includes(r.ca)?r.ca:'Khác')===c).length}</td>`).join('')}
      <td>${totalShifts}</td><td>${fmtHrs(totalHours)}</td><td>${totalPay != null ? fmtVND(totalPay) : ''}</td><td></td></tr></tfoot>
  </table>
  <div class="p-note">Người nhận lương ký vào cột "Ký nhận" khi đã nhận đủ tiền.</div>
  <div class="p-sign">
    <div class="col"><div>&nbsp;</div><div class="role">Người lập bảng</div><div class="space"></div></div>
    <div class="col"><div>Ngày ...... tháng ...... năm ..........</div><div class="role">Chủ quán</div><div class="space"></div></div>
  </div>`;

  $('printArea').innerHTML = html;
  window.print();
}
$('btnPrint').onclick = chotSo;

function shiftMonth(d){
  let [y, m] = month.split('-').map(Number);
  m += d; if(m < 1){ m = 12; y--; } if(m > 12){ m = 1; y++; }
  month = y + '-' + String(m).padStart(2,'0');
  render();
}
$('prev').onclick = () => shiftMonth(-1);
$('mlabel').title = 'Bấm để về tháng hiện tại';
$('mlabel').onclick = () => {
  const n = new Date();
  month = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  render();
};
$('next').onclick = () => shiftMonth(1);

loadAll();
</script>
</body>
</html>
